app = "groceries-together-api"   # 고유 이름 — 이미 사용 중이면 변경
primary_region = "fra"           # 프랑크푸르트 (독일)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
