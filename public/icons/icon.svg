<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 배경 -->
  <rect width="512" height="512" rx="100" fill="#ef8239"/>
  <!-- 장바구니 -->
  <g transform="translate(256,256)" fill="white">
    <!-- 바구니 손잡이 -->
    <path d="M-90,-60 Q-90,-130 0,-130 Q90,-130 90,-60" stroke="white" stroke-width="28" fill="none" stroke-linecap="round"/>
    <!-- 바구니 몸통 -->
    <rect x="-110" y="-60" width="220" height="170" rx="20" fill="white"/>
    <!-- 바구니 안쪽 (배경색) -->
    <rect x="-90" y="-40" width="180" height="130" rx="12" fill="#ef8239"/>
    <!-- 바구니 줄 -->
    <line x1="-30" y1="-40" x2="-30" y2="90" stroke="white" stroke-width="14" stroke-linecap="round"/>
    <line x1="30" y1="-40" x2="30" y2="90" stroke="white" stroke-width="14" stroke-linecap="round"/>
    <!-- 바퀴 -->
    <circle cx="-60" cy="130" r="22" fill="white"/>
    <circle cx="60" cy="130" r="22" fill="white"/>
  </g>
</svg>