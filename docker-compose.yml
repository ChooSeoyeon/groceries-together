services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: groceries
      POSTGRES_USER: groceries
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U groceries"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://groceries:${DB_PASSWORD}@postgres:5432/groceries?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: